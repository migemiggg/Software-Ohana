<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OhanApp &ndash; Iniciar sesión</title>
    <link rel="stylesheet" href="/css/ohana.css">
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <img src="/img/ohana-logo-wide.png" alt="Ohana - Agua Fresca de Sabor">
            <p>Sistema de administración · Ohana®</p>
        </div>

        <div id="error-msg" class="alert alert-danger" style="display:none"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" class="form-control"
                       placeholder="correo@ejemplo.com" required autofocus>
            </div>
            <div class="form-group" style="margin-bottom:1.25rem">
                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" class="form-control"
                       placeholder="••••••••" required>
            </div>
            <button type="submit" id="btn-login" class="btn-ohana"
                    style="width:100%;justify-content:center;padding:.575rem">
                Iniciar sesión
            </button>
        </form>
    </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn   = document.getElementById('btn-login');
    const errEl = document.getElementById('error-msg');
    btn.textContent = 'Entrando...';
    btn.disabled    = true;
    errEl.style.display = 'none';
    try {
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                correo:     document.getElementById('correo').value,
                contrasena: document.getElementById('contrasena').value
            })
        }).then(r => r.json());
        if (res.ok) {
            window.location.href = '/dashboard';
        } else {
            errEl.textContent   = res.error || 'Correo o contraseña incorrectos.';
            errEl.style.display = 'flex';
            btn.textContent = 'Iniciar sesión';
            btn.disabled    = false;
        }
    } catch(_) {
        errEl.textContent   = 'Error de conexión con el servidor.';
        errEl.style.display = 'flex';
        btn.textContent = 'Iniciar sesión';
        btn.disabled    = false;
    }
});
</script>
</body>
</html>
